name: StrikeScore
targets:
  StrikeScore:
    type: application
    platform: iOS
    deploymentTarget: '16.0'
    sources:
      - path: Sources
        includes:
          - "**/*.swift"
          - "**/*.plist" # FIXED: Tells XcodeGen to capture and link your GoogleService-Info.plist automatically
      - path: Resources
        includes:
          - "**/*"
    resources:
      - path: Resources
        includes:
          - "**/*"
    dependencies:
      - framework: MessageUI.framework
        embed: false
      - sdk: UserNotifications.framework
      - sdk: StoreKit.framework
    settings:
      base:
        INFOPLIST_FILE: Sources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kidblunt.strikescore
        PRODUCT_NAME: StrikeScore
        CURRENT_PROJECT_VERSION: '1'
        MARKETING_VERSION: '1.0.0'
        BUNDLE_DISPLAY_NAME: StrikeScore
        IPHONEOS_DEPLOYMENT_TARGET: '16.0'
        EXECUTABLE_NAME: $(PRODUCT_NAME)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: 'YES'
        INFOPLIST_KEY_PrivacyManifestPath: Resources/PrivacyInfo.xcprivacy
        SWIFT_VERSION: '5.0'
        TARGETED_DEVICE_FAMILY: '1'
    preBuildScripts:
      - name: Run CocoaPods
        script: |
          if [ -f "Podfile" ]; then
            pod install
          fi
        shell: /bin/sh
        showEnvVars: true
fileGroups:
  - Sources
  - Resources
options:
  bundleIdPrefix: com.kidblunt
  xcodeVersion: '16.2'
  deploymentTarget: '16.0'
  usesTabs: false
  indentWidth: 2
  tabWidth: 2
  createIntermediateGroups: true
