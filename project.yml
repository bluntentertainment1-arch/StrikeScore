name: StrikeScore
options:
  bundleIdPrefix: com.kidblunt
  xcodeVersion: '16.2'
  deploymentTarget: '16.0'
  usesTabs: false
  indentWidth: 2
  tabWidth: 2
  createIntermediateGroups: true

targets:
  StrikeScore:
    type: application
    platform: iOS
    deploymentTarget: '16.0'
    sources:
      - path: Sources
        includes:
          - "**/*.swift"
          - "**/*.plist"
      - path: Resources
        includes:
          - "**/*"
    dependencies:
      - framework: MessageUI.framework
        embed: false
      - sdk: UserNotifications.framework
      - sdk: StoreKit.framework
    settings:
      base:
        INFOPLIST_FILE: Sources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kidblunt.strikescore
        PRODUCT_NAME: StrikeScore
        CURRENT_PROJECT_VERSION: '125'
        MARKETING_VERSION: '1.0.0'
        BUNDLE_DISPLAY_NAME: StrikeScore
        IPHONEOS_DEPLOYMENT_TARGET: '16.0'
        EXECUTABLE_NAME: $(PRODUCT_NAME)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: 'YES'
        INFOPLIST_KEY_PrivacyManifestPath: Resources/PrivacyInfo.xcprivacy
        SWIFT_VERSION: '5.0'
        TARGETED_DEVICE_FAMILY: '1'
        
        # Let CocoaPods handle all framework/linking configuration via generated xcconfigs
        FRAMEWORK_SEARCH_PATHS: '$(inherited)'
        HEADER_SEARCH_PATHS: '$(inherited)'
        USER_HEADER_SEARCH_PATHS: '$(inherited)'
        LIBRARY_SEARCH_PATHS: '$(inherited)'
        OTHER_LDFLAGS: '$(inherited)'
        OTHER_SWIFT_FLAGS: '$(inherited)'
        CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES: YES

    # Build scripts run INSIDE Xcode builds — this is wrong for CocoaPods
    # because pod install modifies the project file, which triggers a rebuild loop.
    # REMOVE this preBuildScript and run pod install in your CI workflow BEFORE xcodegen.
    # preBuildScripts:
    #   - name: Run CocoaPods
    #     script: |
    #       if [ -f "Podfile" ]; then
    #         pod install
    #       fi
    #     shell: /bin/sh
    #     showEnvVars: true

fileGroups:
  - Sources
  - Resources
