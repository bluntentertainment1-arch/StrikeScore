workflows:
  ios-testflight:
    name: StrikeScore TestFlight Deployment
    max_build_duration: 60
    instance_type: mac_mini_m1
    
    # Integrates your global team Apple API key
    integrations:
      app_store_connect: appleapi

    environment:
      groups:
        - Strikescore # Ensure APP_STORE_APP_ID is added here in the UI
      vars:
        XCODE_WORKSPACE: "StrikeScore.xcworkspace" 
        XCODE_SCHEME: "StrikeScore"
      xcode: 16.2
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true

    scripts:
      - name: Generate Xcode Project and Install Pods
        script: |
          echo "Installing XcodeGen via Homebrew..."
          brew install xcodegen
          
          echo "Generating Xcode project file..."
          xcodegen generate
          
          echo "Installing CocoaPods dependencies..."
          pod install
          
      - name: Initialize keychain and add signing certificates
        script: |
          # Codemagic automatically unpacks the .p12 uploaded to the Code Signing tab
          keychain initialize
          keychain add-certificates
          
      - name: Set up Provisioning Profiles on Xcode project
        script: |
          # Codemagic automatically injects the profile uploaded to the Code Signing tab
          xcode-project use-profiles --production
      
      - name: Increment build number
        script: |
          agvtool new-version -all $(($BUILD_NUMBER + 100))
          
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --mode release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration 
        submit_to_testflight: true
