workflows:
  ios-testflight:
    name: Strikescore TestFlight Deployment
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - apple_credentials # Secure group for BUNDLE_ID and APP_STORE_APP_ID
      vars:
        # XcodeGen typically outputs a .xcodeproj file named after your project configuration
        XCODE_WORKSPACE: "Strikescore.xcodeproj" 
        XCODE_SCHEME: "Strikescore"              # Match this to the scheme name defined in your project.yml
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true

    scripts:
      - name: Install XcodeGen and Generate Project Files
        script: |
          echo "Installing XcodeGen via Homebrew..."
          brew install xcodegen
          
          echo "Generating Xcode project from project.yml..."
          xcodegen generate
          
      - name: Initialize keychain and fetch signing certificates
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --project-type ios --create
          keychain add-certificates
      
      - name: Increment build number
        script: |
          # Fetches the latest TestFlight build number automatically to prevent duplicate errors
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number --app-id "$APP_STORE_APP_ID")
          agvtool new-version -all $(($LATEST_BUILD_NUMBER + 1))
          
      - name: Build iOS IPA
        script: |
          # We use the generated xcodeproj directly since XcodeGen projects don't require a workspace unless using CocoaPods
          xcode-project build-ipa \
            --project "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --mode release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration # Connects via your Codemagic Apple Developer Integration
        submit_to_testflight: true
