workflows:
  ios-testflight:
    name: StrikeScore TestFlight Deployment
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - Strikescore # Updated to match your exact group name in Codemagic
      vars:
        XCODE_WORKSPACE: "StrikeScore.xcworkspace" 
        XCODE_SCHEME: "StrikeScore"
      xcode: 16.2 # Matches the exact Xcode version from your project.yml[span_0](start_span)[span_0](end_span)
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true

    scripts:
      - name: Generate Xcode Project and Install Pods
        script: |
          echo "Installing XcodeGen via Homebrew..."
          brew install xcodegen
          
          echo "Generating Xcode project file..."
          xcodegen generate
          
          echo "Installing CocoaPods dependencies..."
          pod install
          
      - name: Initialize keychain and fetch signing certificates
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.kidblunt.strikescore" --project-type ios --create
          keychain add-certificates
      
      - name: Increment build number
        script: |
          # Automatically fetches the latest TestFlight build number to prevent rejection loops
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number --app-id "$APP_STORE_APP_ID")
          agvtool new-version -all $(($LATEST_BUILD_NUMBER + 1))
          
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --mode release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration # Leverages your App Store Connect API integration configured in the Codemagic UI
        submit_to_testflight: true
