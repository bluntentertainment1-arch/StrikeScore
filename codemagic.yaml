workflows:
  ios-testflight:
    name: StrikeScore TestFlight Deployment
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - Strikescore 
      vars:
        XCODE_WORKSPACE: "StrikeScore.xcworkspace" 
        XCODE_SCHEME: "StrikeScore"
      xcode: 16.2 # Matches the exact Xcode version from your project.yml[span_0](start_span)[span_0](end_span)
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true

    scripts:
      - name: Generate Xcode Project and Install Pods
        script: |
          echo "Installing XcodeGen via Homebrew..."
          brew install xcodegen
          
          echo "Generating Xcode project file..."
          xcodegen generate
          
          echo "Installing CocoaPods dependencies..."
          pod install
          
      - name: Initialize keychain and add signing certificates
        script: |
          # This automatically unpacks and installs the .p12 and profile you uploaded to the UI
          keychain initialize
          keychain add-certificates
          
      - name: Set up Provisioning Profiles on Xcode project
        script: |
          # Forces the generated XcodeGen files to look for your uploaded profile
          xcode-project use-profiles --production
      
      - name: Increment build number
        script: |
          # Uses the standard CI build count offset to keep things unique
          agvtool new-version -all $(($BUILD_NUMBER + 100))
          
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --mode release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration 
        submit_to_testflight: true
