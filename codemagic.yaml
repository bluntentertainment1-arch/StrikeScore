workflows:
  ios-testflight:
    name: StrikeScore TestFlight Deployment
    max_build_duration: 60
    instance_type: mac_mini_m1
    
    integrations:
      app_store_connect: appleapi

    environment:
      groups:
        - Strikescore
      vars:
        XCODE_WORKSPACE: "StrikeScore.xcworkspace" 
        XCODE_SCHEME: "StrikeScore"
      xcode: 16.2
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true

    scripts:
      - name: Generate Xcode Project and Install Pods
        script: |
          echo "Installing XcodeGen via Homebrew..."
          brew install xcodegen
          
          echo "Generating Xcode project file..."
          xcodegen generate
          
          echo "Installing CocoaPods dependencies..."
          pod install
          
      - name: Initialize keychain and add signing certificates
        script: |
          keychain initialize
          
          echo "=== All CM_ environment variables ==="
          env | grep "^CM_" | sort || true
          
          echo "=== Checking MobileDevice certificates path ==="
          ls -la ~/Library/MobileDevice/Certificates/ 2>/dev/null || echo "Not found"
          
          echo "=== Checking Xcode certificates path ==="
          ls -la ~/Library/Developer/Xcode/UserData/Certificates/ 2>/dev/null || echo "Not found"
          
          echo "=== Finding all .p12 files ==="
          find ~ -name "*.p12" 2>/dev/null
          
          echo "=== Finding all .cer files ==="
          find ~ -name "*.cer" 2>/dev/null
          
          # Try auto-discovery first
          keychain add-certificates || true
          
          # If that failed and we have base64 cert fallback, use it
          if [ -n "$CERTIFICATE_P12_BASE64" ]; then
            echo "Using base64 certificate fallback..."
            echo "$CERTIFICATE_P12_BASE64" | base64 --decode > /tmp/certificate.p12
            keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password "$CERTIFICATE_PASSWORD"
          fi
          
      - name: Set up Provisioning Profiles on Xcode project
        script: |
          xcode-project use-profiles --distribution-type app-store --profile "StrikeScore App Store Profile"
      
      - name: Increment build number
        script: |
          agvtool new-version -all $(($BUILD_NUMBER + 100))
          
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --mode release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration 
        submit_to_testflight: true
